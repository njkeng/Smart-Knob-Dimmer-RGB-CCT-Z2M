# The following helpers are needed for the Dimmer RGB CCT blueprint
# The template sensors define the "action" text that the dimmer returns when the user
# operates something on the smart knob. If your smart knob doesn't work with the
# default template sensor, it is probably because the output text from your smart knob doesn't
# fully match what is defined in the default. If this is the case,
# you can create your own custom template sensor using the ones below as examples.
#
# To make a custom template sensor
#     - Copy and paste an entire sensor
#     - Update the name of the sensor to match your smart knob
#     - Update the unique_id to match your smart knob.  You must keep the text prefix "dimmer_blueprint_model_" 
#         otherwise your new template sensor won't show up in the list when you configure the blueprint.
#     - Update the action_map section with the text from your smart knob. The next section has details
#         on how to do this
#     - Home assistant doesn't know about your new template sensor until the yaml files are reloaded. To reload
#         the yaml files, go to Settings -> Developer tools -> YAML. Then click to reload "All YAML configuration".
#     - Now your new template sensor will turn up in the list of available dimmer types when you configure the blueprint.
#
# To work out which words are produced by your device
#     - Open Zigbee2MQTT in Home Assistant
#     - Open the details page for your smart knob
#     - Change to the "State" tab
#     - Operate the button in each of the ways listed in the template below. Single click, double click etc.
#     - Take note of the words that appear beside the "action" parameter
#     - Enter these words into your custom sensor template
#         Important:
#         All the smart knobs that I have used have two modes.  The text changes depending on which mode
#         is active.  That is why there are two entries for most of the actions.  You must record the text
#         for all available modes and enter them in the template.  For all smart knobs that I have used, you simply
#         triple-click the button to toggle modes. So, while you are recording text, triple-click your
#         button and run through all of the actions again.  Note any new text and add it to the template sensor.
#
# One of these template sensors is defined for each type of dimmer
#
template:
  - sensor:
      - name: "Dimmer default"
        unique_id: dimmer_blueprint_model_default
        state: "active"
        attributes:
          action_map: >
            {{ {
              'single_click': ['toggle', 'single'],
              'double_click': ['double'],
              'rotate_left': ['brightness_step_down', 'rotate_left'],
              'rotate_right': ['brightness_step_up', 'rotate_right'],
              'long_press': ['hue_move', 'hold']
            } | tojson }}

  - sensor:
      - name: "Dimmer model Moes ZG-101ZD"
        unique_id: dimmer_blueprint_model_moes_zg_101zd
        state: "active"
        attributes:
          action_map: >
            {{ {
              'single_click': ['toggle', 'single'],
              'double_click': ['double'],
              'rotate_left': ['brightness_step_down', 'rotate_left'],
              'rotate_right': ['brightness_step_up', 'rotate_right'],
              'long_press': ['hue_move', 'hold']
            } | tojson }}
