blueprint:
  name: "Control RGB CCT light with Zigbee Smart Knob"
  description: >
    Blueprint to easily configure a **Zigbee Smart Knob** to control a light entity when integrated into Home Assistant using **Zigbee2MQTT**.


    Note about terminology: 
      
      - When the bulb is in RGB mode, it is a multi-color device and the brightness and color can be adjusted using the knob. 
    
      - When the bulb is in CCT mode, it is a single-color white light and the brightness and warmth can be adjusted using the knob.


    Extended from smirnowegor's blueprint for CCT control 
    
    https://community.home-assistant.io/t/zigbee2mqtt-control-light-entity-including-press-turn-with-tuya-moes-smart-knob-ers-10tzbvk-aa-v1-1/787779/33


    **Important Note:** 
    
    Before configuring this blueprint, you must create three helpers. Details of the helper configuration are below.


    Version 0.2
    

    Tested on:

      - Arlec Grid Connect GLD322HA on Tuya WiFi

      - AliExpress Zigbee RGB+CCT light model TS0505B_1

    <details>
    <summary><b>How to operate</b></summary>

      - Press button: Toggle light

      - Long press: Change between CCT mode and RGB mode
      
      - Double press: Change parameter to adjust
        - In CCT mode, toggles between brightness and color temperature
        - In RGB mode, cycles between brightness, hue and saturation

      - Turn left/right: Adjust the value of the active parameter
    </details>


    <details>
    <summary><b>Helper configuration</b></summary>

    
    Three helpers are needed to store the current state of the dimmer controls. If more than one instance of this blueprint is required, then make sure that all helpers have unique names.
    
    
    Replace aaa with a friendly name of your choice.


    The case of the characters in the options is critical. Make sure everything is lower case, or even copy and paste from the instructions below.
    
    
    Create and configure the three helpers under the menu Settings -> Devices and services -> Helpers


    First helper: Color mode

      - Create helper -> Dropdown
      - Suggested name: Dimmer aaa color mode
      - Add option: cct
      - Add option: rgb
      - Create

      
    Second helper: 

      - Create helper -> Dropdown
      - Suggested name: Dimmer aaa CCT
      - Add option: brightness
      - Add option: temperature
      - Create
      
      
    Third helper: 

      - Create helper -> Dropdown
      - Suggested name: Dimmer aaa RGB
      - Add option: brightness
      - Add option: hue
      - Add option: saturation
      - Create
    </details>

  #  source_url: https://raw.githubusercontent.com/TriggrHappy/blueprint_tuya_smart_knob/refs/heads/main/blueprint.yaml
  domain: automation
  input:
    mqtt_topic:
      name: MQTT Topic
      description: "The parent MQTT topic of the smart knob (e.g. 'zigbee2mqtt/Tuya Smart Knob)'. Typically the last part will be the friendly name of your device."
      selector:
        text:
    light_entity:
      name: Light Entity
      description: "The light to be controlled."
      selector:
        entity:
          filter:
            - domain: light
    color_mode:
      name: Color Mode
      description: "The input_select helper used to store the current lamp mode (RGB or CCT mode)."
      selector:
        entity:
          filter:
            - domain: input_select
    rgb_mode:
      name: RGB Mode
      description: "The input_select helper used to store the current wheel function for RGB mode."
      selector:
        entity:
          filter:
            - domain: input_select
    cct_mode:
      name: CCT Mode
      description: "The input_select helper used to store the current wheel function for CCT mode."
      selector:
        entity:
          filter:
            - domain: input_select
    brightness_step_pct:
      name: Brightness Step Size
      description: "Brightness change per knob click in percent. Higher values = faster changes."
      default: 5
      selector:
        number:
          min: 1
          max: 20
          mode: slider
    min_brightness_pct:
      name: Minimum Brightness (%)
      description: "The minimum brightness you want the light to dim. Set 0 to be able to turn off the light with the dimmer. (Default 1)"
      default: 1
      selector:
        number:
          min: 0
          max: 20
    cct_step:
      name: Color Temperature Step Size
      description: "Color temperature change per knob click in percent. Higher values = faster changes."
      default: 5
      selector:
        number:
          min: 1
          max: 20
          mode: slider
    cct_default:
      name: Default color temperature (%)
      description: "The default color temperature when the light changes to CCT mode."
      default: 10
      selector:
        number:
          min: 5
          max: 100
          mode: slider
          step: 5
    hue_step_pct:
      name: Hue Step Size
      description: "Hue change per knob click in percent. Higher values = faster changes."
      default: 5
      selector:
        number:
          min: 1
          max: 20
          mode: slider
    saturation_step:
      name: Saturation Step Size
      description: "Saturation change per knob click. Higher values = faster changes."
      default: 5
      selector:
        number:
          min: 1
          max: 20
          mode: slider
    automation_mode:
      name: Automation Mode
      description: "Experiment with the different modes if your experience does not feel smooth enough. Normally single should work alright. (Also see https://www.home-assistant.io/docs/automation/modes/ )"
      default: single
      selector:
        select:
          mode: dropdown
          options:
            - single
            - restart
            - queued
            - parallel

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

condition: []

action:
  - variables:
      command: "{{ trigger.payload_json.action }}"
      brightness_step_pct: !input brightness_step_pct
      brightness_step: "{{ (brightness_step_pct * 255 / 100) | int }}"
      cct_step: !input cct_step
      cct_default: !input cct_default
      hue_step_pct: !input hue_step_pct
      hue_step: "{{ (hue_step_pct * 360 / 100) | int }}"
      saturation_step: !input saturation_step
      min_brightness_pct: !input min_brightness_pct
      min_brightness: "{{ (min_brightness_pct * 255 / 100) | int }}"
      mqtt_topic: !input mqtt_topic
      light_entity: !input light_entity
      color_mode: !input color_mode
      color_txt: "{{ states(color_mode) }}"
      rgb_mode: !input rgb_mode
      rgb_txt: "{{ states(rgb_mode) }}"
      cct_mode: !input cct_mode
      cct_txt: "{{ states(cct_mode) }}"

  - choose:
      - conditions: # Change color mode to RGB
          - condition: template
            value_template: "{{ (command == 'hue_move' or command == 'hold') and color_txt == 'cct'}}"
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input color_mode
            data:
              option: "rgb"
          - service: input_select.select_option
            target:
              entity_id: !input rgb_mode
            data:
              option: "hue"
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              hs_color:
                - "{{ state_attr(light_entity, 'hs_color')[0] }}"
                - "80"
          - delay: 2

      - conditions: # Change color mode to CCT
          - condition: template
            value_template: "{{ (command == 'hue_move' or command == 'hold') and color_txt == 'rgb'}}"
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input color_mode
            data:
              option: "cct"
          - service: input_select.select_option
            target:
              entity_id: !input cct_mode
            data:
              option: "brightness"
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {% set kelvin_min = state_attr(light_entity, 'min_color_temp_kelvin') | int(0) %}
                {% set kelvin_max = state_attr(light_entity, 'max_color_temp_kelvin') | int(0) %}
                {% set step_scaled = (kelvin_max - kelvin_min) / 100 | int(0) %}
                {{ (step_scaled * cct_default) + kelvin_min }}
          - delay: 2

      - conditions: # Change RGB parameter
          - condition: template
            value_template: "{{ command == 'double' and color_txt == 'rgb'}}"
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input rgb_mode
            data:
              option: >-
                {% if rgb_txt == 'brightness' %}
                  {{ "hue" }}
                {% elif rgb_txt == 'hue' %}
                  {{ "saturation" }}
                {% else %}
                  {{ "brightness" }}
                {% endif %}

      - conditions: # Change CCT parameter
          - condition: template
            value_template: "{{ command == 'double' and color_txt == 'cct'}}"
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input cct_mode
            data:
              option: >-
                {% if cct_txt == 'brightness' %}
                  {{ "temperature" }}
                {% else %}
                  {{ "brightness" }}
                {% endif %}

      - conditions:
          - condition: template # Toggle light ON or OFF
            value_template: "{{ command == 'toggle' or command == 'single' }}"
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      - conditions: # Turn brightness down
          - condition: template
            value_template: "{{ (command == 'brightness_step_down' or command == 'rotate_left') and ( (color_txt == 'rgb' and rgb_txt == 'brightness') or (color_txt == 'cct' and cct_txt == 'brightness') )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: >-
                {% set current_brightness = state_attr(light_entity, 'brightness') | int %} 
                {% set new_brightness = current_brightness - brightness_step %}
                {{ [new_brightness, min_brightness] | max }}

      - conditions: # Turn brightness up
          - condition: template
            value_template: "{{ (command == 'brightness_step_up' or command == 'rotate_right' ) and ( (color_txt == 'rgb' and rgb_txt == 'brightness') or (color_txt == 'cct' and cct_txt == 'brightness') )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: >-
                {% set current_brightness = state_attr(light_entity, 'brightness') | int %} 
                {% set new_brightness = current_brightness + brightness_step %}
                {{ [new_brightness, 255] | min }}

      - conditions: # Turn color temperature down
          - condition: template
            value_template: "{{ (command == 'brightness_step_down' or command == 'rotate_left') and ( color_txt == 'cct' and cct_txt == 'temperature' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {% set current_kelvin = state_attr(light_entity, 'color_temp_kelvin') | int(0) %}
                {% set kelvin_min = state_attr(light_entity, 'min_color_temp_kelvin') | int(0) %}
                {% set kelvin_max = state_attr(light_entity, 'max_color_temp_kelvin') | int(0) %}
                {% set step_scaled = (kelvin_max - kelvin_min) / 100 | int(0) %}
                {% if current_kelvin is not none %}
                  {% set new_kelvin = [current_kelvin - (step_scaled * cct_step), kelvin_min] | max %}
                  {{ new_kelvin }}
                {% else %}
                  {{ kelvin_min }}
                {% endif %}

      - conditions: # Turn color temperature up
          - condition: template
            value_template: "{{ (command == 'brightness_step_up' or command == 'rotate_right' ) and ( color_txt == 'cct' and cct_txt == 'temperature' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {% set current_kelvin = state_attr(light_entity, 'color_temp_kelvin') | int(0) %}
                {% set kelvin_min = state_attr(light_entity, 'min_color_temp_kelvin') | int(0) %}
                {% set kelvin_max = state_attr(light_entity, 'max_color_temp_kelvin') | int(0) %}
                {% set step_scaled = (kelvin_max - kelvin_min) / 100 | int(0) %}
                {% if current_kelvin is not none %}
                  {% set new_kelvin = [current_kelvin + (step_scaled * cct_step), kelvin_max] | min %}
                  {{ new_kelvin }}
                {% else %}
                  {{ kelvin_min }}
                {% endif %}

      - conditions: # Turn hue down
          - condition: template
            value_template: "{{ (command == 'brightness_step_down' or command == 'rotate_left') and ( color_txt == 'rgb' and rgb_txt == 'hue' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              hs_color:
                - >-
                  {% set current_hue = state_attr(light_entity, 'hs_color')[0] | float %}
                  {% set new_hue = current_hue - hue_step | float %}
                  {% if new_hue < 0 %}
                    {% set new_hue = 360 | float %}
                  {% endif %}
                  {{ new_hue }}

                - >-
                  {{ state_attr(light_entity, 'hs_color')[1] }}

      - conditions: # Turn hue up
          - condition: template
            value_template: "{{ (command == 'brightness_step_up' or command == 'rotate_right' ) and ( color_txt == 'rgb' and rgb_txt == 'hue' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              hs_color:
                - >-
                  {% set current_hue = state_attr(light_entity, 'hs_color')[0] | float %}
                  {% set new_hue = current_hue + hue_step | float %}
                  {% if new_hue > 360 %}
                    {% set new_hue = 0 | float %}
                  {% endif %}
                  {{ new_hue }}

                - >-
                  {{ state_attr(light_entity, 'hs_color')[1] }}

      - conditions: # Turn saturation down
          - condition: template
            value_template: "{{ (command == 'brightness_step_down' or command == 'rotate_left') and ( color_txt == 'rgb' and rgb_txt == 'saturation' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              hs_color:
                - >-
                  {{ state_attr(light_entity, 'hs_color')[0] }}

                - >-
                  {% set current_saturation = state_attr(light_entity, 'hs_color')[1] | float %}
                  {% set new_saturation = current_saturation - saturation_step | float %}
                  {% if new_saturation < 0 %}
                    {% set new_saturation = 0 | float %}
                  {% endif %}
                  {{ new_saturation }}

      - conditions: # Turn saturation up
          - condition: template
            value_template: "{{ (command == 'brightness_step_up' or command == 'rotate_right' ) and ( color_txt == 'rgb' and rgb_txt == 'saturation' )}}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              hs_color:
                - >-
                  {{ state_attr(light_entity, 'hs_color')[0] }}

                - >-
                  {% set current_saturation = state_attr(light_entity, 'hs_color')[1] | float %}
                  {% set new_saturation = current_saturation + saturation_step | float %}
                  {% if new_saturation > 100 %}
                    {% set new_saturation = 100 | float %}
                  {% endif %}
                  {{ new_saturation }}

mode: !input automation_mode
max_exceeded: silent
